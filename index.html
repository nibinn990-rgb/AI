<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant Demo</title>
  <style>
    :root{
      --bg:#212121;
      --panel:#171717;
      --panel-2:#2a2a2a;
      --panel-3:#303030;
      --text:#ececec;
      --muted:#a6a6a6;
      --border:#3a3a3a;
      --accent:#10a37f;
      --chip:#2b2b2b;
      --hover:#383838;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      min-height:100vh;
      overflow:hidden;
    }

    .app{
      display:flex;
      width:100%;
      height:100vh;
    }

    .sidebar{
      width:260px;
      background:#171717;
      border-right:1px solid #2b2b2b;
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .new-chat{
      background:#2a2a2a;
      border:1px solid var(--border);
      color:var(--text);
      padding:12px 14px;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
      text-align:left;
    }
    .new-chat:hover{background:#323232}

    .sidebar-title{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-top:6px;
      padding:0 4px;
    }

    .history-item{
      padding:10px 12px;
      border-radius:10px;
      color:#ddd;
      font-size:14px;
      background:transparent;
      border:1px solid transparent;
    }
    .history-item:hover{
      background:#222;
      border-color:#2f2f2f;
    }

    .main{
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
      position:relative;
    }

    .topbar{
      height:56px;
      display:flex;
      align-items:center;
      padding:0 18px;
      border-bottom:1px solid #2a2a2a;
      color:#ddd;
      font-weight:600;
      background:rgba(33,33,33,.9);
      backdrop-filter: blur(6px);
    }

    .chat-wrap{
      flex:1;
      overflow-y:auto;
      padding:24px 16px 140px;
    }

    .welcome{
      max-width:840px;
      margin:12vh auto 0;
      text-align:center;
      transition:.2s ease;
    }

    .welcome h1{
      font-size:34px;
      line-height:1.2;
      margin:0 0 22px;
      font-weight:700;
    }

    .suggestions{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:10px;
      max-width:900px;
      margin:0 auto;
    }

    .chip{
      background:var(--chip);
      border:1px solid var(--border);
      color:#e9e9e9;
      padding:12px 16px;
      border-radius:999px;
      cursor:pointer;
      font-size:14px;
    }
    .chip:hover{background:var(--hover)}

    .messages{
      max-width:860px;
      margin:0 auto;
      display:none;
      flex-direction:column;
      gap:18px;
    }

    .message{
      display:flex;
      width:100%;
    }

    .message.user{
      justify-content:flex-end;
    }

    .bubble{
      max-width:min(80%, 760px);
      padding:14px 16px;
      border-radius:18px;
      line-height:1.5;
      font-size:15px;
      white-space:pre-wrap;
      word-wrap:break-word;
      border:1px solid var(--border);
    }

    .user .bubble{
      background:#2f2f2f;
      color:#fff;
      border-bottom-right-radius:6px;
    }

    .assistant .bubble{
      background:#1d1d1d;
      color:#f2f2f2;
      border-bottom-left-radius:6px;
    }

    .composer-area{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      padding:18px 16px 20px;
      background:linear-gradient(to top, rgba(33,33,33,1) 65%, rgba(33,33,33,0));
    }

    .composer-wrap{
      max-width:860px;
      margin:0 auto;
    }

    .uploads{
      display:none;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:10px;
    }

    .upload-tag{
      background:#2a2a2a;
      border:1px solid var(--border);
      color:#ddd;
      padding:8px 10px;
      border-radius:10px;
      font-size:13px;
    }

    .composer{
      background:var(--panel-2);
      border:1px solid var(--border);
      border-radius:26px;
      padding:10px;
      display:flex;
      align-items:flex-end;
      gap:10px;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
    }

    .icon-btn{
      width:40px;
      height:40px;
      border-radius:50%;
      border:none;
      background:#3a3a3a;
      color:#fff;
      cursor:pointer;
      flex:0 0 auto;
      font-size:18px;
    }
    .icon-btn:hover{background:#4a4a4a}

    textarea{
      flex:1;
      background:transparent;
      border:none;
      resize:none;
      outline:none;
      color:var(--text);
      font-size:16px;
      line-height:1.5;
      max-height:180px;
      min-height:24px;
      padding:8px 4px;
      font-family:inherit;
    }
    textarea::placeholder{color:#9c9c9c}

    .composer-right{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .send-btn{
      background:var(--accent);
    }
    .send-btn:hover{
      background:#0e8f70;
    }

    .footnote{
      text-align:center;
      color:#8f8f8f;
      font-size:12px;
      margin-top:10px;
    }

    input[type="file"]{
      display:none;
    }

    @media (max-width: 900px){
      .sidebar{display:none}
      .welcome h1{font-size:28px}
      .bubble{max-width:90%}
      .chat-wrap{padding-left:12px;padding-right:12px}
      .composer-area{padding-left:12px;padding-right:12px}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <button class="new-chat" id="newChatBtn">+ New chat</button>
      <div class="sidebar-title">Recent</div>
      <div class="history-item">AI website ideas</div>
      <div class="history-item">Upload image questions</div>
      <div class="history-item">Video and file chat demo</div>
    </aside>

    <main class="main">
      <div class="topbar">AI Assistant</div>

      <div class="chat-wrap" id="chatWrap">
        <section class="welcome" id="welcome">
          <h1>How can I help you today?</h1>
          <div class="suggestions">
            <button class="chip">Create a website layout</button>
            <button class="chip">Summarize my uploaded file</button>
            <button class="chip">Explain this image</button>
            <button class="chip">Write a product description</button>
          </div>
        </section>

        <section class="messages" id="messages"></section>
      </div>

      <div class="composer-area">
        <div class="composer-wrap">
          <div class="uploads" id="uploads"></div>

          <div class="composer">
            <button class="icon-btn" id="attachBtn" title="Upload file">+</button>
            <input type="file" id="fileInput" multiple accept="image/*,video/*,.pdf,.doc,.docx,.txt,.csv,.zip" />

            <textarea id="promptInput" rows="1" placeholder="Message AI Assistant"></textarea>

            <div class="composer-right">
              <button class="icon-btn" title="Voice">🎤</button>
              <button class="icon-btn send-btn" id="sendBtn" title="Send">➤</button>
            </div>
          </div>

          <div class="footnote">Demo mode: replies are simulated in your browser.</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const welcome = document.getElementById('welcome');
    const messages = document.getElementById('messages');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');
    const uploads = document.getElementById('uploads');
    const chatWrap = document.getElementById('chatWrap');
    const chips = document.querySelectorAll('.chip');
    const newChatBtn = document.getElementById('newChatBtn');

    let uploadedFiles = [];

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 180) + 'px';
    }

    promptInput.addEventListener('input', () => autoResize(promptInput));

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function addMessage(role, text) {
      messages.style.display = 'flex';
      welcome.style.display = 'none';

      const row = document.createElement('div');
      row.className = `message ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = escapeHtml(text);

      row.appendChild(bubble);
      messages.appendChild(row);
      chatWrap.scrollTop = chatWrap.scrollHeight;
    }

    function getDemoReply(text) {
      const q = text.trim().toLowerCase();

      if (!q) return "Please type a message.";

      if (q === "hi" || q === "hello" || q === "hey") {
        return "Hello! How can I help you today?";
      }

      if (q.includes("who are you")) {
        return "I’m a demo AI assistant running fully in HTML, CSS, and JavaScript.";
      }

      if (q.includes("create website")) {
        return "Sure — I can help you design an AI website with chat, image upload, video upload, file upload, and question-answer sections.";
      }

      if (q.includes("image")) {
        return "You can upload images in this demo. In a real AI version, I could analyze the image and answer questions about it.";
      }

      if (q.includes("video")) {
        return "You can attach videos here for demo purposes. A real AI app could summarize or analyze video content with backend processing.";
      }

      if (q.includes("file") || q.includes("pdf") || q.includes("document")) {
        return "File upload is enabled in the interface. In a real implementation, the system could extract text and answer questions from the document.";
      }

      if (q.includes("help")) {
        return "I can help with chat UI, AI website ideas, uploads, layouts, and demo responses.";
      }

      return `Demo reply: You asked "${text}". This HTML-only version gives simulated responses. If you want real AI answers, I can build the next version with API integration.`;
    }

    function sendMessage(customText = null) {
      const text = customText !== null ? customText : promptInput.value.trim();
      if (!text && uploadedFiles.length === 0) return;

      let userText = text;
      if (!userText && uploadedFiles.length > 0) {
        userText = "Uploaded files";
      }

      addMessage('user', userText);

      if (uploadedFiles.length > 0) {
        const fileNames = uploadedFiles.map(f => f.name).join(', ');
        addMessage('assistant', `I can see these selected files: ${fileNames}. In this demo, files are listed only. Real file analysis would need backend AI processing.`);
        uploadedFiles = [];
        uploads.innerHTML = '';
        uploads.style.display = 'none';
      }

      if (text) {
        const reply = getDemoReply(text);
        setTimeout(() => addMessage('assistant', reply), 400);
      }

      promptInput.value = '';
      autoResize(promptInput);
    }

    sendBtn.addEventListener('click', () => sendMessage());

    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    attachBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const files = Array.from(e.target.files || []);
      if (!files.length) return;

      uploadedFiles = uploadedFiles.concat(files);
      uploads.style.display = 'flex';

      files.forEach(file => {
        const tag = document.createElement('div');
        tag.className = 'upload-tag';
        tag.textContent = file.name;
        uploads.appendChild(tag);
      });

      fileInput.value = '';
    });

    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        sendMessage(chip.textContent);
      });
    });

    newChatBtn.addEventListener('click', () => {
      messages.innerHTML = '';
      messages.style.display = 'none';
      welcome.style.display = 'block';
      uploads.innerHTML = '';
      uploads.style.display = 'none';
      uploadedFiles = [];
      promptInput.value = '';
      autoResize(promptInput);
    });
  </script>
</body>
</html>

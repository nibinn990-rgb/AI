<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant</title>
  <style>
    :root{--bg:#212121;--panel:#171717;--panel-2:#2a2a2a;--panel-3:#303030;--text:#ececec;--muted:#a9a9a9;--border:#3a3a3a;--accent:#10a37f;}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;}
    .app{display:flex;height:100vh;width:100%;overflow:hidden;}
    .sidebar{width:260px;background:var(--panel);border-right:1px solid #2c2c2c;padding:16px;display:flex;flex-direction:column;gap:14px;}
    .brand{font-size:18px;font-weight:700;padding:6px 4px;}
    .new-chat{width:100%;border:none;border-radius:12px;background:var(--panel-3);color:var(--text);padding:12px 14px;cursor:pointer;text-align:left;font-size:14px;}
    .new-chat:hover{background:#3a3a3a}
    .key-section{display:flex;flex-direction:column;gap:6px;}
    .key-label{font-size:11px;color:var(--muted);}
    .key-row{display:flex;gap:6px;}
    .key-input{flex:1;background:#1e1e1e;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 9px;font-size:11px;font-family:monospace;outline:none;min-width:0;}
    .key-input:focus{border-color:#555;}
    .key-save{border:none;background:var(--accent);color:white;border-radius:8px;padding:7px 10px;cursor:pointer;font-size:11px;white-space:nowrap;}
    .key-save:hover{filter:brightness(1.1)}
    .key-status{font-size:11px;color:var(--muted);}
    .key-status.ok{color:#10a37f;}
    .side-note{margin-top:auto;color:var(--muted);font-size:12px;line-height:1.6;}
    .side-note a{color:#10a37f;text-decoration:none;}
    .main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;}
    .chat-scroll{flex:1;overflow:auto;padding:24px 20px 160px;}
    .welcome{max-width:880px;margin:12vh auto 0;text-align:center;padding:0 20px;}
    .welcome h1{font-size:34px;margin:0 0 18px;font-weight:700;}
    .welcome p{color:var(--muted);margin:0 0 26px;font-size:15px;}
    .suggestions{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:14px;}
    .pill{background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:10px 14px;font-size:14px;cursor:pointer;}
    .pill:hover{background:#353535}
    .messages{max-width:900px;margin:0 auto;width:100%;display:none;flex-direction:column;gap:18px;}
    .msg{display:flex;gap:12px;align-items:flex-start;}
    .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex:0 0 34px;}
    .avatar.user{background:#4b4b4b}
    .avatar.assistant{background:var(--accent);color:white}
    .bubble{max-width:min(760px,100%);padding:14px 16px;border-radius:16px;line-height:1.6;word-wrap:break-word;font-size:15px;border:1px solid var(--border);}
    .bubble.user{background:#2f2f2f;}
    .bubble.assistant{background:#262626;white-space:pre-wrap;}
    .bubble.assistant code{background:#1a1a1a;padding:2px 6px;border-radius:4px;font-family:monospace;font-size:13px;color:#e2b96a;}
    .bubble.assistant pre{background:#1a1a1a;padding:12px 14px;border-radius:10px;overflow-x:auto;margin:8px 0;border:1px solid #333;}
    .bubble.assistant pre code{background:none;padding:0;color:#ccc;font-size:13px;}
    .composer-wrap{position:absolute;left:0;right:0;bottom:0;padding:18px 16px 20px;background:linear-gradient(to top,rgba(33,33,33,1) 55%,rgba(33,33,33,0));}
    .composer-area{max-width:900px;margin:0 auto;}
    .composer{display:flex;align-items:flex-end;gap:10px;background:#2b2b2b;border:1px solid #3a3a3a;border-radius:26px;padding:10px;box-shadow:0 10px 30px rgba(0,0,0,.22);}
    .input-wrap{flex:1;display:flex;flex-direction:column;gap:8px;}
    textarea{width:100%;resize:none;border:none;outline:none;background:transparent;color:var(--text);font-size:16px;line-height:1.5;min-height:28px;max-height:180px;padding:8px 4px;font-family:inherit;}
    textarea::placeholder{color:#b8b8b8;}
    .composer-footer{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 4px 2px;}
    .hint{color:var(--muted);font-size:12px;}
    .send-btn{border:none;background:var(--accent);color:white;min-width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
    .send-btn:hover{filter:brightness(1.07)}
    .send-btn:disabled{opacity:.55;cursor:not-allowed;}
    .typing{display:inline-flex;gap:5px;align-items:center;padding:2px 0;}
    .typing span{width:7px;height:7px;border-radius:50%;background:#bdbdbd;display:inline-block;animation:bounce 1.2s infinite ease-in-out;}
    .typing span:nth-child(2){animation-delay:.15s}
    .typing span:nth-child(3){animation-delay:.3s}
    @keyframes bounce{0%,80%,100%{transform:scale(.7);opacity:.6}40%{transform:scale(1);opacity:1}}
    .err{color:#e57373;font-size:13px;padding:8px 12px;background:#2a1a1a;border:1px solid #4a2a2a;border-radius:10px;}
    @media(max-width:860px){.sidebar{display:none}.welcome h1{font-size:28px}.chat-scroll{padding:18px 12px 160px}.composer-wrap{padding:14px 10px 14px}.bubble{font-size:14px}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">AI Assistant</div>
    <button class="new-chat" id="newChatBtn">＋ New chat</button>
    <div class="key-section">
      <div class="key-label">🔑 Gemini API Key</div>
      <div class="key-row">
        <input class="key-input" id="keyInput" type="password" placeholder="AIzaSy..." />
        <button class="key-save" id="keySave">Save</button>
      </div>
      <div class="key-status" id="keyStatus">Enter your key above</div>
    </div>
    <div class="side-note">
      Get free key at<br>
      <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a><br><br>
      Key saved in your browser only — never shared with anyone.
    </div>
  </aside>
  <main class="main">
    <div class="chat-scroll" id="chatScroll">
      <section class="welcome" id="welcome">
        <h1>How can I help you today?</h1>
        <p>Add your Gemini API key in the sidebar to start.</p>
        <div class="suggestions">
          <button class="pill" data-prompt="Hi, what can you help me with?">Say hi</button>
          <button class="pill" data-prompt="How to create a VLAN in a Cisco switch?">Cisco VLAN</button>
          <button class="pill" data-prompt="Write a Python script to ping a host">Python ping script</button>
          <button class="pill" data-prompt="Explain subnetting in simple terms">Subnetting explained</button>
        </div>
      </section>
      <div class="messages" id="messages"></div>
    </div>
    <div class="composer-wrap">
      <div class="composer-area">
        <div class="composer">
          <div class="input-wrap">
            <textarea id="promptInput" placeholder="Ask anything..." rows="1"></textarea>
            <div class="composer-footer">
              <div class="hint">Enter to send · Shift+Enter for new line</div>
              <button class="send-btn" id="sendBtn">➤</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script>
  const welcome=document.getElementById('welcome'),messages=document.getElementById('messages'),input=document.getElementById('promptInput'),sendBtn=document.getElementById('sendBtn'),newChatBtn=document.getElementById('newChatBtn'),scroll=document.getElementById('chatScroll');
  const keyInput=document.getElementById('keyInput'),keySave=document.getElementById('keySave'),keyStatus=document.getElementById('keyStatus');
  let history=[];

  // Load saved key from localStorage
  const savedKey=localStorage.getItem('gemini_key');
  if(savedKey){keyInput.value=savedKey;keyStatus.textContent='✓ Key loaded';keyStatus.className='key-status ok';}

  keySave.addEventListener('click',()=>{
    const k=keyInput.value.trim();
    if(!k){keyStatus.textContent='Please enter a key';keyStatus.className='key-status';return;}
    localStorage.setItem('gemini_key',k);
    keyStatus.textContent='✓ Key saved';
    keyStatus.className='key-status ok';
  });

  function appendMessage(text, isUser, isError=false) {
    welcome.style.display = 'none';
    messages.style.display = 'flex';
    
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg';
    
    const avatar = document.createElement('div');
    avatar.className = `avatar ${isUser ? 'user' : 'assistant'}`;
    avatar.textContent = isUser ? 'U' : 'AI';
    
    const bubble = document.createElement('div');
    bubble.className = isError ? 'err' : `bubble ${isUser ? 'user' : 'assistant'}`;
    bubble.textContent = text;
    
    msgDiv.appendChild(avatar);
    msgDiv.appendChild(bubble);
    messages.appendChild(msgDiv);
    scroll.scrollTop = scroll.scrollHeight;
    return bubble;
  }

  async function handleSend() {
    const text = input.value.trim();
    const key = keyInput.value.trim();
    if (!text) return;
    if (!key) { alert('Please enter and save your Gemini API Key first.'); return; }

    input.value = '';
    input.style.height = 'auto';
    appendMessage(text, true);
    
    history.push({ role: 'user', parts: [{ text: text }] });

    const typingBubble = appendMessage('', false);
    typingBubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    sendBtn.disabled = true;

    try {
      const response = await fetch(`https://googleapis.com{key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: history })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || 'API request failed');

      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response generated.';
      typingBubble.textContent = reply;
      history.push({ role: 'model', parts: [{ text: reply }] });
    } catch (err) {
      typingBubble.parentElement.remove();
      appendMessage(`Error: ${err.message}`, false, true);
      history.pop(); 
    } finally {
      sendBtn.disabled = false;
      scroll.scrollTop = scroll.scrollHeight;
    }
  }

  sendBtn.addEventListener('click', handleSend);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + '28px';
  });

  newChatBtn.addEventListener('click', () => {
    messages.innerHTML = '';
    messages.style.display = 'none';
    welcome.style.display = 'block';
    history = [];
  });

  document.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      input.value = pill.getAttribute('data-prompt');
      handleSend();
    });
  });
</script>
</body>
</html>
